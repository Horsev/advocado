<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advocado</title>
    <meta name="description" content="Teamwork extension for Chrome" />
    <link rel="icon" href="favicon-32x32.png" />
  </head>
  <body>
    <canvas id="magicCanvas" style="display: none;"></canvas>
    <div id="app"></div>
    <style>
      #magicCanvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        pointer-events: none;
      }
      #app {
        position: relative;
        z-index: 0;
      }
    </style>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
